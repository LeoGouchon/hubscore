services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - db

  tests:
    image: maven:3.9.6-eclipse-temurin-21
    working_dir: /app
    volumes:
      - .:/app
      - maven-cache:/root/.m2
    command: mvn test

volumes:
  dbdata:
  maven-cache:
